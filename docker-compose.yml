services:
  postgres:
    image: postgres:17-alpine
    container_name: SWAO-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=swao
      - POSTGRES_USER=swao_user
      - POSTGRES_PASSWORD=AGF123
    ports:
      - "5432:5432"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swao_user -d swao"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: SWAO-pgadmin
    restart: unless-stopped
    networks:
      - backend
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@swao.com
      - PGADMIN_DEFAULT_PASSWORD=AGF123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: Ticket_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://swao_user:AGF123@postgres:5432/swao
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: SWAO-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    networks:
      - backend
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

networks:
  backend: {}

volumes:
  postgres_data:
  pgadmin_data:
  rabbitmq_data:
